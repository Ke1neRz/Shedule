{% extends "base.html" %}
{% block title %}{{ 'Изменить' if curriculum else 'Добавить' }} учебный план{% endblock %}
{% block content %}
<h1>{{ 'Изменить' if curriculum else 'Добавить' }} учебный план</h1>
<form method="post">
  <div class="mb-3"><label>Название</label><input name="name" class="form-control" value="{{ curriculum.name if curriculum else '' }}" required></div>
  <div class="mb-3"><label>Код направления</label><input name="direction_code" class="form-control" value="{{ curriculum.direction_code if curriculum else '' }}" required></div>
  <div class="row">
    <div class="col-md-6 mb-3"><label>Год набора</label><input type="number" name="admission_year" class="form-control" value="{{ curriculum.admission_year if curriculum else 2024 }}" required></div>
    <div class="col-md-6 mb-3"><label>Длительность (лет)</label><input type="number" name="duration_years" class="form-control" value="{{ curriculum.duration_years if curriculum else 4 }}" required min="1"></div>
  </div>
  <button class="btn btn-success">Сохранить</button>
  <a href="/curriculum/" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
