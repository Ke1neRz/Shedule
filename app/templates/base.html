<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Расписание{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    {% block head %}{% endblock %}
    <style>
      body { background: #f4f6fa; }
      .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
      .navbar-dark .navbar-nav .nav-link { transition: background 0.15s ease; border-radius: 6px; margin: 0 2px; }
      .navbar-dark .navbar-nav .nav-link:hover { background: rgba(255,255,255,0.12); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-calendar3"></i> Расписание</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="/divisions/">Подразделения</a></li>
        <li class="nav-item"><a class="nav-link" href="/teachers/">Преподаватели</a></li>
        <li class="nav-item"><a class="nav-link" href="/curriculum/">Учебные планы</a></li>
        <li class="nav-item"><a class="nav-link" href="/groups/">Группы</a></li>
        <li class="nav-item"><a class="nav-link" href="/rooms/">Помещения</a></li>
        <li class="nav-item"><a class="nav-link" href="/timeslots/">Пары</a></li>
        <li class="nav-item"><a class="nav-link" href="/calendar/">Календарь</a></li>
        <li class="nav-item"><a class="nav-link" href="/schedule/">Расписание</a></li>
        <li class="nav-item"><a class="nav-link" href="/reports/">Отчёты</a></li>
        <li class="nav-item"><a class="nav-link" href="/universities/">Университеты</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
