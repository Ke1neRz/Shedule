{% extends "base.html" %}
{% block title %}Подразделения{% endblock %}
{% block content %}
<h1>Подразделения</h1>
<a href="/divisions/add" class="btn btn-primary mb-3">Добавить</a>
<table class="table table-bordered">
<thead><tr><th>Название</th><th>Действия</th></tr></thead>
<tbody>
{% for d in divisions %}
<tr>
  <td>{{ '..'|safe * d.level }} {{ d.name }}</td>
  <td>
    <a href="/divisions/edit/{{ d.division_id }}" class="btn btn-sm btn-warning">Изменить</a>
    <form action="/divisions/delete/{{ d.division_id }}" method="post" class="d-inline" onsubmit="return confirm('Удалить?')">
      <button class="btn btn-sm btn-danger">Удалить</button>
    </form>
  </td>
</tr>
{% endfor %}
</tbody>
</table>
{% endblock %}
